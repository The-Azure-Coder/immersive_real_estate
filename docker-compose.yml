version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: realestate_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=realestate
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically create the test database on startup as required by the plan
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: realestate_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    environment:
      # Matches app/core/config.py from the plan
      - DATABASE_URL=postgresql://user:pass@db:5432/realestate
      - SECRET_KEY=your-secret-key-here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - NANOBANANA_API_KEY=your-key
      - USE_S3=false
      - LOCAL_STORAGE_PATH=/app/uploads
      # AWS Settings (Optional fallback)
      - AWS_ACCESS_KEY_ID=your-aws-key
      - AWS_SECRET_ACCESS_KEY=your-aws-secret
      - AWS_BUCKET_NAME=your-bucket
      - AWS_REGION=us-east-1
    command: /start.sh

  # Service to run tests (pytest) in the container environment
  test:
    build: .
    container_name: realestate_test
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/realestate_test
      - SECRET_KEY=test_secret
      - ALGORITHM=HS256
      - NANOBANANA_API_KEY=test_key
      - USE_S3=false
      - LOCAL_STORAGE_PATH=/app/uploads
    command: pytest tests/

volumes:
  postgres_data:
