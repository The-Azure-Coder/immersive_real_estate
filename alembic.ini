# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template for migration file names, e.g. "%%(rev)s_%%(slug)s.py"
# (requires that revision_environment be true)
# revision_environment = false
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering timestamps within the migration file,
# e.g. "UTC"
# timezone =

# title for version table columns
# version_table_schema =
# revision_format_length = 4

# set to 'true' to allow .pyc and .pyo files without a source .py file
# python_warnings = false

# ... etc.


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated migration scripts.  See documentation for
# details and examples.

# format using "black" - use the console entry point of the "black" package
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79

# format using "autopep8" - use the console entry point of the "autopep8" package
# hooks = autopep8
# autopep8.type = console_scripts
# autopep8.entrypoint = autopep8
# autopep8.options = --in-place

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic, simple

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[formatter_simple]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
