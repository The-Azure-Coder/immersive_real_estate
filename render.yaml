services:
  # FastAPI Web Service
  - type: web
    name: immersive-real-estate-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free # Change to 'starter' if you need persistent disk or faster builds
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: immersive-db
          property: connectionString
      - key: NANOBANANA_API_KEY
        sync: false # Set this in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: USE_S3
        value: false # Use Render's free local storage (not persistent) or set to true if using AWS
    
  # PostgreSQL Database Instance
  - type: database
    name: immersive-db
    databaseName: realestate
    user: admin
    plan: free # Note: Render free databases expire after 90 days.
