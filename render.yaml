services:
  # FastAPI Web Service
  - type: web
    name: "immersive-real-estate-api"
    env: "docker"
    dockerContext: "."
    dockerfilePath: "Dockerfile"
    plan: "free"
    envVars:
      - key: "DATABASE_URL"
        fromDatabase:
          name: "immersive-db"
          property: "connectionString"
      - key: "NANOBANANA_API_KEY"
        sync: false
      - key: "SECRET_KEY"
        generateValue: true
      - key: "USE_S3"
        value: "false"
      - key: "PORT"
        value: "8000"

databases:
  # PostgreSQL Database Instance
  - name: "immersive-db"
    databaseName: "realestate"
    user: "admin"
    plan: "free"
    postgresMajorVersion: "15"
