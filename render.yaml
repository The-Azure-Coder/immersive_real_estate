services:
  # FastAPI Web Service
  - type: web
    name: "immersive-real-estate-api"
    env: "docker"
    dockerContext: "."
    dockerfilePath: "Dockerfile"
    plan: "free"
    envVars:
      - key: "DATABASE_URL"
        sync: false # You will paste your Neon URL in the Render Dashboard
      - key: "NANOBANANA_API_KEY"
        sync: false
      - key: "SECRET_KEY"
        generateValue: true
      - key: "USE_S3"
        value: "false"
      - key: "PORT"
        value: "8000"

# Note: The 'databases' section has been removed because we are using NeonDB.
